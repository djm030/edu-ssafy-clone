name: Full Clone CI Smoke

on:
  pull_request:
  push:
    branches:
      - main
      - dev

jobs:
  verify:
    name: Build and smoke contracts
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Validate Docker Compose files
        run: |
          docker compose -f compose.yml config >/tmp/compose.yml
          docker compose -f compose.yml --profile app config >/tmp/compose-app.yml
          docker compose -f compose.observability.yml config >/tmp/compose-observability.yml

      - name: Scan for forbidden credential markers
        run: scripts/dev/scan-secrets.sh

      - name: Verify OpenAPI smoke contract markers
        run: |
          grep -F '/api/auth/login' docs/openapi.yaml
          grep -F '/api/me' docs/openapi.yaml
          grep -F '/api/profile' docs/openapi.yaml
          grep -F '/api/boards/{boardCode}/posts' docs/openapi.yaml
          grep -F 'Assert-JsonProperty' scripts/dev/smoke.ps1
          grep -F 'Invoke-SmokeJson' scripts/dev/smoke.ps1

      - name: Validate POSIX production smoke scripts
        run: |
          bash -n scripts/dev/smoke.sh
          bash -n scripts/dev/smoke-routes.sh
          bash -n scripts/dev/verify-restdocs.sh
          bash -n scripts/dev/smoke-observability.sh
          SKIP_HTTP=true scripts/dev/smoke.sh
          SKIP_HTTP=true scripts/dev/smoke-routes.sh
          SKIP_HTTP=true scripts/dev/smoke-observability.sh

      - name: Backend tests
        working-directory: backend
        run: mvn -B test

      - name: Verify Spring REST Docs snippets
        run: RUN_TESTS=false scripts/dev/verify-restdocs.sh

      - name: Frontend dependencies
        run: npm --prefix frontend ci

      - name: Frontend lint
        run: npm --prefix frontend run lint

      - name: Frontend build
        run: npm --prefix frontend run build

      - name: Install Playwright browser
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Browser E2E core flows
        run: npm --prefix frontend run e2e -- --project=chromium e2e/core-flows.spec.ts

      - name: Browser visual baseline
        run: npm --prefix frontend run e2e -- --project=chromium e2e/visual-baseline.spec.ts

      - name: Generate hosted CI sign-off checklist
        if: always()
        env:
          CI_SIGNOFF_OUT: build/reports/ci-signoff.md
          CI_RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: scripts/dev/ci-signoff.sh

      - name: Upload CI sign-off evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-signoff-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            build/reports/ci-signoff.md
            build/reports/observability-smoke.jsonl
          if-no-files-found: warn
