# =========================================================
# Codex / OMX Profiles (project-local)
# =========================================================

# ---------------------------------------------------------
# 1) OMX Team: 일반 구현용
# ---------------------------------------------------------
[profiles.omx-team]
model = "gpt-5.3-codex"
model_reasoning_effort = "medium"
model_verbosity = "medium"
web_search = "disabled"
tool_output_token_limit = 10000
commit_attribution = ""
check_for_update_on_startup = false
suppress_unstable_features_warning = true

[profiles.omx-team.tools]
web_search = false

[profiles.omx-team.apps._default]
enabled = false
destructive_enabled = false
open_world_enabled = false

[profiles.omx-team.history]
persistence = "save-all"
max_bytes = 15728640


# ---------------------------------------------------------
# 1.5) OMX Plan: 계획/합의용 (reasoning 상향)
# ---------------------------------------------------------
[profiles.omx-plan]
