openapi: 3.0.3
info:
  title: eduSSAFY Clone API
  version: 0.7.0
  description: Maintained R7.0 contract artifact until generated springdoc output is enabled.
servers:
  - url: http://localhost:8080
paths:
  /api/health:
    get:
      summary: Backend health probe
      responses:
        '200':
          description: Backend is up
  /api/auth/login:
    post:
      summary: Demo login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /api/me:
    get:
      summary: Current user bootstrap
      responses:
        '200':
          description: Current user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /api/profile:
    get:
      summary: Get current profile
      responses:
        '200':
          description: Current profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProfileResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
    put:
      summary: Update current profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProfileUpdateRequest'
      responses:
        '200':
          description: Updated profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProfileResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /api/profile/password-check:
    post:
      summary: Check current user's password
      responses:
        '200':
          description: Password check result
        '401':
          $ref: '#/components/responses/Unauthorized'
  /api/boards/{boardCode}/categories:
    get:
      summary: List board categories
      parameters:
        - $ref: '#/components/parameters/BoardCode'
      responses:
        '200':
          description: Board categories
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BoardCategoryListResponse'
  /api/boards/{boardCode}/posts:
    get:
      summary: List board posts
      parameters:
        - $ref: '#/components/parameters/BoardCode'
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: size
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
        - name: keyword
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Board post page
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BoardPostListResponse'
    post:
      summary: Create board post
      parameters:
        - $ref: '#/components/parameters/BoardCode'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BoardPostCreateRequest'
      responses:
        '201':
          description: Created board post wrapper
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BoardPostCreateResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
  /api/boards/{boardCode}/posts/{postId}:
    get:
      summary: Get board post detail
      parameters:
        - $ref: '#/components/parameters/BoardCode'
        - name: postId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Board post detail wrapper
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BoardPostDetailResponse'
        '404':
          description: Board or post not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
  /api/boards/{boardCode}/posts/{postId}/comments:
    post:
      summary: Create board comment
      responses:
        '201':
          description: Created comment wrapper
        '401':
          $ref: '#/components/responses/Unauthorized'
  /api/boards/{boardCode}/posts/{postId}/reactions:
    post:
      summary: Toggle board reaction
      responses:
        '201':
          description: Reaction state wrapper
        '401':
          $ref: '#/components/responses/Unauthorized'
components:
  parameters:
    BoardCode:
      name: boardCode
      in: path
      required: true
      schema:
        type: string
        enum: [notice, free, faq, qna]
  responses:
    Unauthorized:
      description: Authentication is required
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiErrorResponse'
    Forbidden:
      description: Authenticated user lacks permission
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiErrorResponse'
  schemas:
    ApiErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code:
              type: string
            message:
              type: string
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
    LoginResponse:
      type: object
      required: [user]
      properties:
        user:
          $ref: '#/components/schemas/UserSummary'
    UserSummary:
      type: object
      required: [id, email, name]
      properties:
        id:
          type: integer
          format: int64
        email:
          type: string
        name:
          type: string
        role:
          type: string
    ProfileResponse:
      type: object
      required: [profile]
      properties:
        profile:
          type: object
          required: [id, email, name]
          properties:
            id:
              type: integer
              format: int64
            email:
              type: string
            name:
              type: string
            mobilePhone:
              type: string
              nullable: true
    ProfileUpdateRequest:
      type: object
      properties:
        name:
          type: string
        mobilePhone:
          type: string
        addressLine1:
          type: string
    PageMeta:
      type: object
      required: [page, size, totalItems, totalPages]
      properties:
        page:
          type: integer
        size:
          type: integer
        totalItems:
          type: integer
        totalPages:
          type: integer
    BoardCategoryListResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            type: object
            required: [id, name]
            properties:
              id:
                type: integer
                format: int64
              name:
                type: string
              sortOrder:
                type: integer
    BoardPostListResponse:
      type: object
      required: [items, page]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/BoardPostListItem'
        page:
          $ref: '#/components/schemas/PageMeta'
    BoardPostListItem:
      type: object
      required: [id, boardCode, title]
      properties:
        id:
          type: integer
          format: int64
        boardCode:
          type: string
        title:
          type: string
        authorName:
          type: string
        commentCount:
          type: integer
        reactionCount:
          type: integer
    BoardPostDetailResponse:
      type: object
      required: [post]
      properties:
        post:
          type: object
          required: [id, boardCode, title, content, engagement]
          properties:
            id:
              type: integer
              format: int64
            boardCode:
              type: string
            title:
              type: string
            content:
              type: string
            engagement:
              type: object
              required: [commentCount, reactionCount, bookmarkCount]
              properties:
                commentCount:
                  type: integer
                reactionCount:
                  type: integer
                bookmarkCount:
                  type: integer
    BoardPostCreateRequest:
      type: object
      required: [title, content]
      properties:
        categoryId:
          type: integer
          format: int64
        title:
          type: string
          maxLength: 255
        content:
          type: string
          maxLength: 4000
    BoardPostCreateResponse:
      type: object
      required: [item]
      properties:
        item:
          type: object
          required: [id, boardCode, title, content, demo]
          properties:
            id:
              type: integer
              format: int64
            boardCode:
              type: string
            categoryId:
              type: integer
              format: int64
              nullable: true
            title:
              type: string
            content:
              type: string
            demo:
              type: boolean
