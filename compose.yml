services:
  mysql:
    image: mysql:8.0
    container_name: ssafy-clone-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-change-me-root-password}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-ssafy_clone}
      TZ: ${TZ:-Asia/Seoul}
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    volumes:
      - ssafy_mysql_data:/var/lib/mysql
      - ./docs/revised_schema_mysql8.sql:/docker-entrypoint-initdb.d/10-schema.sql:ro
      - ./scripts/mysql/20-board-list-seed.sql:/docker-entrypoint-initdb.d/20-board-list-seed.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "MYSQL_PWD=\"$${MYSQL_ROOT_PASSWORD}\" mysql -N -uroot -e 'SELECT @@port' | grep -qx 3306"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 20s
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: ssafy-clone-redis
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - ssafy_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 5s
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: ssafy-clone-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:-ssafy}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:-change-me-rabbit-password}
      TZ: ${TZ:-Asia/Seoul}
    ports:
      - "${RABBITMQ_PORT:-5672}:5672"
      - "${RABBITMQ_MANAGEMENT_PORT:-15672}:15672"
    volumes:
      - ssafy_rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 18
      start_period: 20s
    restart: unless-stopped

  backend:
    profiles: ["app"]
    image: ${BACKEND_IMAGE:-ssafy-clone-backend:local}
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-docker}
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/${MYSQL_DATABASE:-ssafy_clone}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul&characterEncoding=utf8
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_ROOT_PASSWORD:-change-me-root-password}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: ${RABBITMQ_DEFAULT_USER:-ssafy}
      SPRING_RABBITMQ_PASSWORD: ${RABBITMQ_DEFAULT_PASS:-change-me-rabbit-password}
      EDUSSAFY_AUTH_ALLOW_NOOP_PASSWORDS: ${EDUSSAFY_AUTH_ALLOW_NOOP_PASSWORDS:-false}
      SERVER_SERVLET_SESSION_TIMEOUT: ${SERVER_SERVLET_SESSION_TIMEOUT:-30m}
      SERVER_SERVLET_SESSION_COOKIE_SECURE: ${SERVER_SERVLET_SESSION_COOKIE_SECURE:-false}
      SERVER_SERVLET_SESSION_COOKIE_SAME_SITE: ${SERVER_SERVLET_SESSION_COOKIE_SAME_SITE:-lax}
      TZ: ${TZ:-Asia/Seoul}
    expose:
      - "8080"
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/api/readiness >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 40s
    restart: unless-stopped

  frontend:
    profiles: ["app"]
    image: ${FRONTEND_IMAGE:-ssafy-clone-frontend:local}
    build:
      context: ./frontend
      dockerfile: Dockerfile
    expose:
      - "80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost/ || curl -fsS http://localhost/ >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s
    restart: unless-stopped

  nginx:
    profiles: ["app"]
    image: nginx:1.27-alpine
    container_name: ssafy-clone-nginx
    ports:
      - "${HTTP_PORT:-80}:80"
    volumes:
      - ./infra/nginx/conf.d:/etc/nginx/conf.d:ro
    depends_on:
      frontend:
        condition: service_healthy
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1/nginx-health"]
      interval: 10s
      timeout: 3s
      retries: 12
      start_period: 5s
    restart: unless-stopped

volumes:
  ssafy_mysql_data:
  ssafy_redis_data:
  ssafy_rabbitmq_data:
