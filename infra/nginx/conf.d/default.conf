upstream ssafy_frontend {
    server frontend:80;
}

upstream ssafy_backend {
    server backend:8080;
}

map $http_x_request_id $ssafy_request_id {
    default $http_x_request_id;
    "" $request_id;
}

log_format ssafy_json escape=json
    '{"time":"$time_iso8601","requestId":"$ssafy_request_id","remoteAddr":"$remote_addr",'
    '"method":"$request_method","uri":"$request_uri","status":$status,'
    '"bodyBytesSent":$body_bytes_sent,"requestTime":$request_time,'
    '"upstreamStatus":"$upstream_status","upstreamResponseTime":"$upstream_response_time"}';

server {
    listen 80;
    server_name _;

    client_max_body_size 20m;
    access_log /var/log/nginx/access.log ssafy_json;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), geolocation=(), microphone=(), payment=(), usb=()" always;
    add_header Cross-Origin-Resource-Policy "same-origin" always;
    add_header X-Request-Id "$ssafy_request_id" always;

    location = /nginx-health {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    location /api/ {
        proxy_pass http://ssafy_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-Id $ssafy_request_id;
    }


    location = /swagger-ui.html {
        proxy_pass http://ssafy_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-Id $ssafy_request_id;
    }

    location /swagger-ui/ {
        proxy_pass http://ssafy_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-Id $ssafy_request_id;
    }

    location /v3/api-docs {
        proxy_pass http://ssafy_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-Id $ssafy_request_id;
    }

    location /actuator/ {
        proxy_pass http://ssafy_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-Id $ssafy_request_id;
    }

    location / {
        proxy_pass http://ssafy_frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-Id $ssafy_request_id;
    }
}
