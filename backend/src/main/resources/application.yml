spring:
  application:
    name: edussafy-backend
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://mysql:3306/edussafy?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul}
    username: ${SPRING_DATASOURCE_USERNAME:edussafy}
    password: ${SPRING_DATASOURCE_PASSWORD:edussafy}
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:redis}
      port: ${SPRING_DATA_REDIS_PORT:6379}
  rabbitmq:
    host: ${SPRING_RABBITMQ_HOST:rabbitmq}
    port: ${SPRING_RABBITMQ_PORT:5672}
    username: ${SPRING_RABBITMQ_USERNAME:guest}
    password: ${SPRING_RABBITMQ_PASSWORD:guest}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true
  metrics:
    tags:
      application: edussafy-backend

logging:
  pattern:
    console: "ts=%d{yyyy-MM-dd'T'HH:mm:ss.SSSXXX} level=%5p requestId=%X{requestId} thread=%t logger=%logger{36} msg=%m%n"

server:
  servlet:
    session:
      timeout: ${SERVER_SERVLET_SESSION_TIMEOUT:30m}
      cookie:
        http-only: true
        secure: ${SERVER_SERVLET_SESSION_COOKIE_SECURE:false}
        same-site: ${SERVER_SERVLET_SESSION_COOKIE_SAME_SITE:lax}
  error:
    whitelabel:
      enabled: false


edussafy:
  auth:
    password:
      allow-noop: ${EDUSSAFY_AUTH_ALLOW_NOOP_PASSWORDS:false}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
    doc-expansion: none
  show-actuator: true
